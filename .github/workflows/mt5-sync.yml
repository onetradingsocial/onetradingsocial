# Hourly MT5 sync trigger. Vercel Hobby crons are daily-only, so GitHub
# Actions drives the two sync phases instead:
#   :00 deploy  — boot MetaApi accounts (tier-gated inside the route)
#   :10 collect — fetch closed deals into journals, then undeploy
# Requires repo secret CRON_SECRET matching the Vercel env var of the same name.
name: MT5 sync

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '10 * * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Which phase to run (deploy | collect)'
        required: true
        default: 'collect'
        type: choice
        options: [deploy, collect]

concurrency:
  group: mt5-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call sync route
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PHASE="${{ inputs.phase }}"
          elif [ "${{ github.event.schedule }}" = "0 * * * *" ]; then
            PHASE=deploy
          else
            PHASE=collect
          fi
          echo "Phase: $PHASE"
          code=$(curl -sS -o /tmp/out -w '%{http_code}' \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://app.tradingsocial.io/api/mt5-sync/${PHASE}")
          cat /tmp/out; echo
          echo "HTTP ${code}"
          test "${code}" = "200"
